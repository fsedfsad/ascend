services:
  - type: web
    name: ascend-bot
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
      - key: DATA_PATH
        value: /data
    disk:
      name: ascend-bot-data
      mountPath: /data
      sizeGB: 1

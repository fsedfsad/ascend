services:
  - type: web
    name: ascend-bot
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
      - key: JSONBIN_KEY
        sync: false
      - key: XP_BIN_ID
        sync: false
      - key: ACH_BIN_ID
        sync: false
# No disk needed — data lives in JSONBin.io for free
